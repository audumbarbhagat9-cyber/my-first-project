<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audumbar's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <header class="navbar">
        <div class="logo-box">
            <span class="logo-text">AUDUMBAR'S PORTFOLIO</span>
        </div>
        <nav class="nav-links">
            <a href="#">About</a>
            <a href="#">Home</a>
            <a href="#">Skill</a>
            <a href="#">Contact Me</a>
        </nav>
    </header>

    <main class="container">
        
        <div class="avatar-container">
            <div class="avatar">
                <i class="fas fa-user"></i>
            </div>
        </div>

        <div class="intro-section">
            <p class="greeting">Hey, It's</p>
            <h1 class="my-name">Audumbar Bhagat</h1>
            <p class="role">I am a MERN Developer | Always learning and building</p>
        </div>

        <div class="social-section">
            <h3 class="connect-text">Connect with me</h3>
            <div class="social-icons">
                <a href="#" target="_blank"><i class="fab fa-github"></i></a>
                <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>

        <section class="contact-section">
            <h2 class="contact-title">Contact <span>Me</span></h2>
            <div class="form-container">
                <form>
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label for="mobile">Mobile number</label>
                        <input type="tel" id="mobile" placeholder="Enter your mobile number">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="suggestion">Your Suggestion for me</label>
                        <textarea id="suggestion" rows="4" placeholder="Enter your Suggestion"></textarea>
                    </div>
                </form>
            </div>
        </section>

    </main>

</body>
</html>
